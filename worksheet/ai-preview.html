function buildMessages(u) {

  msgs.push({role:'user', text: u.typeAnswer});
  msgs.push({role:'ai', text: u.ai2});
  msgs.push({role:'user', text: u.u2});
  msgs.push({role:'ai', text: u.ai3});
  msgs.push({role:'user', text: u.pick});
  msgs.push({role:'ai', text: u.final});
  msgs.push({role:'ai', text:`ここまでで、${u.nick}のアカウントの方向性が見えてきました。\n\n**次のステップは、所属に合わせて進めてください。**\n\n📌 **アカデミー生の方**\nこの方向性をベースに、個別セッションまたはグルコン（グループコンサル）で講師に相談してください。アカデミー生用のモデリング分析シートもご活用ください。\n\n📌 **まだ入会していない方**\nこの方向性でモデリング先を探し、アカウントの方向性を固めていってください。\n\n─────────────────\n\nここまで進めてくださって、本当にありがとうございました。\n\nアカウントの初期設計は、発信の土台になる大切な部分です。\n\nもし今しっくりこない部分があれば、もう一度シートに戻ってやり直してみてください。心から納得できるアカウントを、一緒に見つけていきましょう 🙏`});
  return msgs;
}

function renderCard(u) {
  const msgs = buildMessages(u);
  const msgHTML = msgs.map(m => {
    const text = m.text
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/\n\n/g,'<br><br>')
      .replace(/\n/g,'<br>');
    return `<div class="msg ${m.role}">${text}</div>`;
  }).join('');
  return `
  <div class="card">
    <div class="card-head">
      <div class="person">${u.nick} <span>ペルソナ例</span></div>
      <div class="tags">${u.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    </div>
    <div class="chat">${msgHTML}</div>
  </div>`;
}
