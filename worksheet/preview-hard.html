<style>

  {type:"ideas", typeLabel:"案を大量に求める",

  {type:"ideas", typeLabel:"案を大量に求める",

   ai:`100個は出せますが、ほとんどが似たようなものになってしまいます。

ということで、まずこの2つを教えてください。

① 発信したいジャンルで「一番のターゲット」はどんな人ですか？
② 自分の「一番の強み・実績」は何ですか？

**【感情に訴える系】**

function filter(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.card').forEach(c => {
    if (type === 'all' || c.dataset.type === type) c.classList.remove('hidden');
    else c.classList.add('hidden');
  });
}

function renderCard(p, idx) {
  const headClass = {
    ideas:'type-ideas', nogood:'type-nogood',
    nostrength:'type-nostrength', more:'type-more', hard:'type-hard'
  }[p.type] || 'type-ideas';

  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.type = p.type;

  card.innerHTML = `
    <div class="card-head ${headClass}">
      <div class="person">
        <span class="num">${idx+1}.</span>
        <span>${p.typeLabel}</span>
      </div>
    </div>
    <div class="chat"></div>
  `;

  const chat = card.querySelector('.chat');

  // user message
  const uDiv = document.createElement('div');
  uDiv.className = 'msg user';
  uDiv.textContent = p.question;
  chat.appendChild(uDiv);

  // ai message
  const aDiv = document.createElement('div');
  aDiv.className = 'msg ai';
  aDiv.innerHTML = p.ai
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');
  chat.appendChild(aDiv);

  document.getElementById('grid').appendChild(card);
}

PATTERNS.forEach((p, i) => renderCard(p, i));
