<style>
:root{--primary:#B86A4F;--cream:#FAF5EE;--cream-deep:#F2E8DA;--white:#fff;--text:#3D2818;--text-mute:#A08775;--line:#E5D5C3;--navy:#1A2B4A;--gold:#B8860B;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans JP',sans-serif;background:#EDE0D0;color:var(--text);-webkit-font-smoothing:antialiased;}
.page-hdr{text-align:center;padding:32px 16px 16px;}
.page-hdr h1{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:400;}
.page-hdr p{font-size:12px;color:var(--text-mute);margin-top:6px;line-height:1.8;}
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:0 16px 24px;}
.filter-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--line);background:var(--white);font-size:11px;cursor:pointer;color:var(--text-mute);font-family:'Noto Sans JP',sans-serif;}
.filter-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;padding:0 20px 60px;max-width:1600px;margin:0 auto;}
.card{background:var(--white);border-radius:18px;overflow:hidden;box-shadow:0 4px 20px rgba(60,30,10,.07);}
.card.hidden{display:none;}
.card-head{background:var(--navy);padding:14px 18px;}
.card-head .person{font-size:13px;font-weight:500;color:#fff;display:flex;align-items:center;gap:8px;}
.card-head .person span{font-size:10px;color:rgba(255,255,255,.5);font-weight:300;}
.card-head .tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;}
.tag{font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,.15);color:rgba(255,255,255,.8);}
.style-badge{display:inline-block;font-size:9px;padding:2px 7px;border-radius:10px;margin-left:6px;vertical-align:middle;}
.style-badge.detail{background:#2D7A4F;color:#fff;}
.style-badge.brief{background:#B86A4F;color:#fff;}
.style-badge.question{background:#B8860B;color:#fff;}
.chat{padding:14px 16px;display:flex;flex-direction:column;gap:10px;max-height:580px;overflow-y:auto;}
.msg{max-width:88%;padding:10px 13px;border-radius:12px;font-size:12.5px;line-height:1.75;}
.msg.ai{background:var(--cream-deep);border:1px solid var(--line);color:var(--text);align-self:flex-start;border-bottom-left-radius:3px;white-space:pre-wrap;}
.msg.user{background:var(--navy);color:#fff;align-self:flex-end;border-bottom-right-radius:3px;white-space:pre-wrap;}
.msg strong,.msg b{font-weight:600;}
</style>

function filter(style) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.card').forEach(c => {
    if (style === 'all' || c.dataset.style === style) c.classList.remove('hidden');
    else c.classList.add('hidden');
  });
}

function renderMsg(m) {
  const d = document.createElement('div');
  d.className = 'msg ' + m.r;
  d.innerHTML = m.t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');
  return d;
}

function buildCard(u, idx) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.style = u.style;

  const styleLabel = {detail:'詳しく入力',brief:'簡易入力',question:'質問・迷い型'}[u.style];
  const styleClass = {detail:'detail',brief:'brief',question:'question'}[u.style];

  card.innerHTML = `
    <div class="card-head">
      <div class="person">${idx+1}. ${u.nick} <span>${u.age}代</span><span class="style-badge ${styleClass}">${styleLabel}</span></div>
      <div class="tags">${u.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    </div>
    <div class="chat" id="chat-${idx}"></div>
  `;
  document.getElementById('grid').appendChild(card);

  const chatEl = document.getElementById('chat-${idx}');
  const chat = card.querySelector('.chat');
  u.msgs.forEach(m => chat.appendChild(renderMsg(m)));
}

USERS.forEach((u, i) => buildCard(u, i));
