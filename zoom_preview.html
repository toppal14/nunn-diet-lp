<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Zoom背景プレビュー（全スライド）</title>
<style>
  body { margin:0; background:#222; color:#eee; font-family: system-ui, sans-serif; }
  .wrap { max-width: 1400px; margin: 24px auto; padding: 0 16px; }
  h2 { font-size: 14px; font-weight: 500; margin: 16px 0 8px; color:#bbb; }
  .stage { position: relative; width: 100%; background:#000; border-radius: 8px; overflow: hidden;
           aspect-ratio: 2229/941; margin-bottom: 24px; }
  .stage img { width: 100%; height: 100%; display: block; }
  .cam {
    position: absolute;
    left: 2%;
    bottom: 5%;
    width: 18%;
    aspect-ratio: 3/4;
    border: 3px solid #fff;
    border-radius: 12px;
    background: linear-gradient(135deg, #6a86b6 0%, #2d3e5e 100%);
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,.9); font-size: 13px;
    box-shadow: 0 8px 24px rgba(0,0,0,.4);
  }
</style>
</head>
<body>
  <div class="wrap">
    <h2>全スライド（左1/4が空き＝Zoomカメラ枠 / 右3/4がデザイン）</h2>
    <div id="grid"></div>
  </div>
<script>
const files = [
"385B5C88-EA23-4111-BA9A-014655BCBB72",
"4DD05E79-D08F-4C5B-B242-7F1CB3C04535",
"5B9DCCEA-2132-4FC7-A294-85CE18830851",
"81F0BE7E-D10E-4190-98C4-68F5288E6118",
"876083EE-5B34-4C51-8CFE-C05131154104",
"8E73AA9E-9F1D-403F-9389-08560A7227B0",
"B7343FD6-C4B5-4EDF-9090-EBB4328D5F44",
"BF72CDF4-8E4E-494A-9E4D-779108275CDE",
"CE529855-AD6C-4676-BB80-F3606801E543",
"D6BB94F4-A151-4507-912A-B507FC5B84DD",
"EB9C7F3E-A694-490C-AE7E-0B1381F5D591"
];
const grid = document.getElementById("grid");
files.forEach(f => {
  const stage = document.createElement("div");
  stage.className = "stage";
  stage.innerHTML = `<img src="/zoom_slides/${f}.PNG"><div class="cam">あなたのカメラ</div>`;
  grid.appendChild(stage);
});
</script>
</body>
</html>
